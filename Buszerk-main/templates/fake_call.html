{% extends "base.html" %}

{% block title %}Fake Call{% endblock %}

{% block content %}
<div class="fake-call-container">
    <div id="confirmation-section" class="sos-section" style="display: block;">
        <h1>Fake Call Simulator</h1>
        <p id="message">{{ message if message else "Trigger a fake call to simulate an incoming call?" }}</p>
        <form id="trigger-form" method="POST" action="/trigger_call">
            <button type="submit" class="btn-primary" {% if call_scheduled %}disabled{% endif %}>Trigger Fake Call</button>
        </form>
        {% if call_scheduled %}
            <p>Call will ring in a few seconds...</p>
        {% endif %}
        <button type="button" id="cancel-fake-call" class="btn-secondary">Cancel</button>
    </div>

    <div id="call-screen" class="sos-section" style="display: none; flex-direction: column; align-items: center; justify-content: center;">
        <div class="caller-info">
            <h2 class="caller-name">Appa</h2>
            <p class="caller-type">Mobile</p>
        </div>
        <div class="bottom-buttons">
            <button class="accept btn-primary" onclick="acceptCall()">
                <svg class="phone-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/>
                </svg>
            </button>
            <button class="reject btn-secondary" onclick="rejectCall()">
                <svg class="phone-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.2-.07.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.2.07-.47-.12-.61l-2.03-1.58zm-7.14 4.06c-2.11 0-3.88-1.51-4.31-3.56-.21-.99.14-2.05.76-2.94.81-.95 1.62-1.44 2.55-1.44s1.75.49 2.55 1.44c.62.89.97 1.95.76 2.94-.43 2.05-2.2 3.56-4.31 3.56z"/>
                </svg>
            </button>
        </div>
    </div>

    <audio id="callAudio" style="display: none;">
        <source src="{{ url_for('static', filename='Dad.mp3') }}" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>
</div>

<script>
    // Define URLs from Flask template rendering
    const homeUrl = "{{ url_for('home') }}";

    document.getElementById('trigger-form').addEventListener('submit', function(event) {
        event.preventDefault();
        fetch('/trigger_call', { method: 'POST' })
            .then(response => response.text())
            .then(html => {
                document.getElementById('message').textContent = "Call scheduled in 5 seconds!";
                document.querySelector('button[type="submit"]').disabled = true;
                document.getElementById('confirmation-section').innerHTML += '<p>Call will ring in a few seconds...</p>';
                startPolling();
            });
    });

    function startPolling() {
        let checkInterval = setInterval(function() {
            fetch('/check_call?triggered=true')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('message').textContent = data.message;
                    if (data.ringing) {
                        document.getElementById('confirmation-section').style.display = 'none';
                        document.getElementById('call-screen').style.display = 'flex';
                        clearInterval(checkInterval);
                    }
                });
        }, 1000);
    }

    function acceptCall() {
        const audio = document.getElementById('callAudio');
        try {
            audio.play();
        } catch (error) {
            console.error("Error playing audio:", error);
        }
    }

    function rejectCall() {
        const audio = document.getElementById('callAudio');
        audio.pause();
        audio.currentTime = 0;
        document.getElementById('call-screen').style.display = 'none';
        document.getElementById('confirmation-section').style.display = 'block';
    }

    // Handle Cancel button
    document.getElementById('cancel-fake-call').addEventListener('click', function() {
        window.location.href = homeUrl;
    });
</script>
<style>
    .fake-call-container {
        max-width: 600px;
        margin: 40px auto;
        text-align: center;
    }

    .sos-section {
        background-color: var(--secondary-bg);
        padding: 20px;
        border-radius: 10px;
        margin-bottom: 20px;
    }

    .sos-section p {
        margin-bottom: 15px;
        color: var(--text-primary);
    }

    .caller-info {
        margin-bottom: 20px;
    }

    .caller-name {
        font-size: 32px;
        font-weight: bold;
        color: var(--text-primary);
    }

    .caller-type {
        font-size: 18px;
        color: var(--text-secondary);
    }

    .bottom-buttons {
        display: flex;
        justify-content: space-around;
        margin-top: 40px;
        width: 100%;
        max-width: 300px;
    }

    .accept {
        background-color: #4CAF50;
        width: 60px;
        height: 60px;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        border: none;
        cursor: pointer;
        transition: transform 0.3s ease;
    }

    .accept:hover {
        transform: scale(1.1);
    }

    .reject {
        background-color: #f44336;
        width: 60px;
        height: 60px;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        border: none;
        cursor: pointer;
        transition: transform 0.3s ease;
    }

    .reject:hover {
        transform: scale(1.1);
    }

    .phone-icon {
        width: 30px;
        height: 30px;
        fill: var(--text-primary);
    }
</style>
{% endblock %}
